    fillOpacity: 0.9

      <div><b>What:</b> ${c.what}</div>
      <div><b>Founded:</b> ${c.founded} &nbsp;<b>Employees:</b> ~${c.employees}</div>
      <div><b>Total raised:</b> ${c.raised}</div>
      <div><b>Latest round:</b> ${c.latest}</div>
    </div>`;
  const teamHtml = (c.team && c.team.length) ? `
    <div style="margin-top:8px;border-top:1px solid #e5e7eb;padding-top:6px;">
      <div style="font-weight:600;font-size:11px;color:#374151;margin-bottom:4px;">Ask for:</div>

      </ul>
    </div>` : '';

  return m;
}

COMPANIES.forEach((c) => (markers[c.id] = makeMarker(c)));

const list = document.getElementById("list");
COMPANIES.forEach((c) => {
  const li = document.createElement("li");
  li.dataset.id = c.id;
  const badgeClass =
    c.conf === "verified" ? "badge-verified" :
    c.conf === "approx" ? "badge-approx" : "badge-unverified";
  const badgeText =
    c.conf === "verified" ? "exact" :
    c.conf === "approx" ? "approx" : "?";
  li.innerHTML = `
    <input type="checkbox" data-id="${c.id}" />
    <div class="company-info">
      <div class="company-name">${c.name} <span class="badge ${badgeClass}">${badgeText}</span></div>
      <div class="company-addr">${c.addr}</div>
      <div style="margin-top:4px;"><span class="meta-pill">${c.reqs} hardtech reqs</span><span class="meta-pill">${c.raised}</span></div>
    </div>`;
  li.addEventListener("click", (e) => {
    if (e.target.tagName !== "INPUT") {
      map.flyTo([c.lat, c.lng], 14, { duration: 0.6 });
      markers[c.id].openPopup();
    }
  });
  li.querySelector("input").addEventListener("change", (e) => {
    e.stopPropagation();
    toggleSelect(c.id, e.target.checked);
  });
  list.appendChild(li);
});

function toggleSelect(id, force) {
  const isSel = force === undefined ? !selected.has(id) : force;
  if (isSel) selected.add(id); else selected.delete(id);
  const li = list.querySelector(`li[data-id="${id}"]`);
  const cb = li.querySelector("input");
  cb.checked = isSel;
  li.classList.toggle("selected", isSel);
  markers[id].setStyle({
    radius: isSel ? 11 : 8,
    weight: isSel ? 3 : 2,
    color: isSel ? "#1d4ed8" : "#fff"
  });
  document.getElementById("count").textContent = `${selected.size} selected`;
}

document.getElementById("search").addEventListener("input", (e) => {
  const q = e.target.value.trim().toLowerCase();
  COMPANIES.forEach((c) => {
    const li = list.querySelector(`li[data-id="${c.id}"]`);
    if (!li) return;
    if (!q) { li.style.display = ""; return; }
    const haystack = [c.name, c.addr, c.what, c.raised, c.latest, ...(c.team || []).flatMap(t => [t.name, t.title])].join(" ").toLowerCase();
    li.style.display = haystack.includes(q) ? "" : "none";
  });
});

document.getElementById("select-all").addEventListener("click", () => {
  COMPANIES.forEach((c) => toggleSelect(c.id, true));
});
document.getElementById("clear").addEventListener("click", () => {
  [...selected].forEach((id) => toggleSelect(id, false));
});

document.getElementById("route").addEventListener("click", () => {
  if (selected.size < 2) {
    alert("Select at least 2 companies to build a route.");
    return;
  }
  if (selected.size > 10) {
    if (!confirm(`Google Maps supports up to 10 stops. You selected ${selected.size}. Continue with the first 10 in radar order?`)) return;
  }
  const stops = COMPANIES
    .filter((c) => selected.has(c.id))
    .slice(0, 10)
    .map((c) => `${c.lat},${c.lng}`);
  const url = `https://www.google.com/maps/dir/${stops.join("/")}`;
  window.open(url, "_blank");
});
</script>
</body>
</html>
